<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kolam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0d0d0d;
      font-family: 'DM Sans', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    h1 {
      font-family: 'Fraunces', serif;
      color: #fff;
      font-weight: 600;
      font-size: 1.75rem;
      margin: 0 0 0.35rem 0;
      letter-spacing: 0.02em;
    }
    .instructions {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.8125rem;
      margin-bottom: 1.5rem;
      text-align: center;
      max-width: 320px;
      line-height: 1.45;
    }
    .board-wrap {
      background: #0d0d0d;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    #board {
      display: block;
      touch-action: none;
      border-radius: 8px;
    }
    .controls {
      margin-top: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      align-items: center;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .control-row label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.8125rem;
      font-weight: 500;
      white-space: nowrap;
    }
    input[type="range"] {
      width: 88px;
      height: 6px;
      accent-color: #fff;
      cursor: pointer;
    }
    input[type="number"],
    input[type="text"]#rowPattern {
      padding: 0.4rem 0.6rem;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.875rem;
      color: #fff;
      background: #141414;
      transition: border-color 0.15s;
    }
    input:focus {
      outline: none;
      border-color: #444;
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }
    button {
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.55rem 1.1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #fff;
      color: #0a0a0a;
      transition: background 0.15s, transform 0.1s;
    }
    button:hover {
      background: #e5e5e5;
    }
    button:active {
      transform: scale(0.98);
    }
    button#clear {
      background: transparent;
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid #333;
    }
    button#clear:hover {
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      border-color: #444;
    }
    .credit {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.4);
    }
    .credit a {
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }
    .credit a:hover {
      color: rgba(255, 255, 255, 0.8);
      border-bottom-color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>
  <h1>Kolam</h1>
  <p class="instructions">Connect the dots; then freehand in white to connect the ×’s.</p>
  <div class="board-wrap">
    <svg id="board" width="320" height="320" viewBox="0 0 320 320"></svg>
  </div>
  <div class="controls">
    <div class="control-row">
      <label for="opacity">Lines & × opacity</label>
      <input type="range" id="opacity" min="0" max="100" value="35" />
    </div>
    <div class="control-row">
      <label for="rowPattern">Row pattern</label>
      <input type="text" id="rowPattern" placeholder="7,5,7,5,7" value="7,5,7,5,7" size="14" title="Comma-separated: dots in each row" />
    </div>
    <button type="button" id="undo">Undo</button>
    <button type="button" id="clear">Clear</button>
  </div>
  <p class="credit">Drawing method inspired by <a href="https://alpaca.pubpub.org/pub/xywz3ebv/release/1" target="_blank" rel="noopener">Anuradha Reddy</a>’s work.</p>

  <script>
    (function () {
      const DOT_RADIUS = 3;
      const PADDING = 40;
      const BOARD_SIZE = 320;
      const NS = 'http://www.w3.org/2000/svg';
      const SEGMENT_STROKE = '#c49568';
      const HIT_R2 = (DOT_RADIUS * 2) ** 2;

      let rowCounts = [7, 5, 7, 5, 7];
      let SPACING = 40;
      let center = { x: BOARD_SIZE / 2, y: BOARD_SIZE / 2 };
      let boardRect = null;

      const board = document.getElementById('board');
      const linesGroup = document.createElementNS(NS, 'g');
      const dotsGroup = document.createElementNS(NS, 'g');
      const freehandGroup = document.createElementNS(NS, 'g');
      board.append(linesGroup, dotsGroup, freehandGroup);

      const dots = [];
      const lines = [];
      const lineKeys = new Set();
      const freehandStrokes = [];
      const undoStack = [];
      let dragStart = null;
      let previewGroup = null;
      let freehandPoints = [];
      let freehandPath = null;

      function getDot(x, y) {
        for (let i = 0; i < dots.length; i++) {
          const d = dots[i];
          const dx = x - d.x, dy = y - d.y;
          if (dx * dx + dy * dy <= HIT_R2) return i;
        }
        return -1;
      }

      function rotatePoint(px, py, turns) {
        let dx = px - center.x, dy = py - center.y;
        for (let t = 0; t < turns; t++) [dx, dy] = [dy, -dx];
        return { x: center.x + dx, y: center.y + dy };
      }

      function getDotIndexAt(x, y) {
        const tol2 = (SPACING / 2) ** 2;
        let best = -1, bestD2 = tol2;
        for (let i = 0; i < dots.length; i++) {
          const d = dots[i];
          const d2 = (x - d.x) ** 2 + (y - d.y) ** 2;
          if (d2 < bestD2) { bestD2 = d2; best = i; }
        }
        return best;
      }

      function segmentKey(a, b) {
        return a < b ? `${a}-${b}` : `${b}-${a}`;
      }

      function createLine(x1, y1, x2, y2, opacity) {
        const line = document.createElementNS(NS, 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        line.setAttribute('stroke', SEGMENT_STROKE);
        line.setAttribute('stroke-width', '3');
        line.setAttribute('stroke-linecap', 'round');
        if (opacity != null) line.setAttribute('opacity', opacity);
        return line;
      }

      function addCross(mx, my) {
        const d = 5 / Math.SQRT2;
        const g = document.createElementNS(NS, 'g');
        const l1 = document.createElementNS(NS, 'line');
        l1.setAttribute('x1', mx - d); l1.setAttribute('y1', my - d);
        l1.setAttribute('x2', mx + d); l1.setAttribute('y2', my + d);
        const l2 = document.createElementNS(NS, 'line');
        l2.setAttribute('x1', mx + d); l2.setAttribute('y1', my - d);
        l2.setAttribute('x2', mx - d); l2.setAttribute('y2', my + d);
        [l1, l2].forEach(l => { l.setAttribute('stroke', SEGMENT_STROKE); l.setAttribute('stroke-width', '2'); l.setAttribute('stroke-linecap', 'round'); });
        g.append(l1, l2);
        return g;
      }

      function rotatedDotIndex(i, turns) {
        const p = rotatePoint(dots[i].x, dots[i].y, turns);
        return getDotIndexAt(p.x, p.y);
      }

      function addLine(i, j) {
        if (i === j) return;
        const segs = [[i, j], [rotatedDotIndex(i, 1), rotatedDotIndex(j, 1)], [rotatedDotIndex(i, 2), rotatedDotIndex(j, 2)], [rotatedDotIndex(i, 3), rotatedDotIndex(j, 3)]];
        const added = [];
        for (const [a, b] of segs) {
          if (a < 0 || b < 0 || a === b) continue;
          const key = segmentKey(a, b);
          if (lineKeys.has(key)) continue;
          lineKeys.add(key);
          const p1 = dots[a], p2 = dots[b];
          const line = createLine(p1.x, p1.y, p2.x, p2.y);
          const crossEl = addCross((p1.x + p2.x) / 2, (p1.y + p2.y) / 2);
          linesGroup.append(line, crossEl);
          lines.push({ a, b, el: line });
          added.push({ lineEl: line, crossEl, a, b });
        }
        if (added.length) undoStack.push({ type: 'segment', items: added });
      }

      function createDots() {
        while (dotsGroup.firstChild) dotsGroup.removeChild(dotsGroup.firstChild);
        dots.length = 0;
        const cx = BOARD_SIZE / 2;
        const cy = BOARD_SIZE / 2;
        const ROWS = rowCounts.length;
        const maxDots = Math.max(...rowCounts);
        const w = (maxDots - 1) * SPACING;
        const h = ROWS > 1 ? (ROWS - 1) * SPACING : 0;
        const oy = cy - h / 2;

        for (let row = 0; row < ROWS; row++) {
          const n = rowCounts[row];
          const rowWidth = (n - 1) * SPACING;
          const ox = cx - rowWidth / 2;
          const y = oy + row * SPACING;
          for (let col = 0; col < n; col++) {
            const x = ox + col * SPACING;
            const circle = document.createElementNS(NS, 'circle');
            circle.setAttribute('cx', x);
            circle.setAttribute('cy', y);
            circle.setAttribute('r', DOT_RADIUS);
            circle.setAttribute('fill', '#fff');
            circle.setAttribute('stroke', '#aaa');
            circle.setAttribute('stroke-width', '1');
            dotsGroup.appendChild(circle);
            dots.push({ x, y });
          }
        }
      }

      function parseRowPattern(str) {
        const parts = String(str || '').split(/[\s,]+/).filter(Boolean);
        const out = parts.map(p => Math.max(1, Math.min(15, parseInt(p, 10) || 1)));
        return out.length ? out : [7, 5, 7, 5, 7];
      }

      function rebuildBoard(patternInput) {
        rowCounts = parseRowPattern(patternInput);
        const ROWS = rowCounts.length;
        const maxDots = Math.max(...rowCounts);
        const spaceW = maxDots > 1 ? (BOARD_SIZE - 2 * PADDING) / (maxDots - 1) : 40;
        const spaceH = ROWS > 1 ? (BOARD_SIZE - 2 * PADDING) / (ROWS - 1) : 40;
        SPACING = Math.min(spaceW, spaceH);
        center = { x: BOARD_SIZE / 2, y: BOARD_SIZE / 2 };
        while (linesGroup.firstChild) linesGroup.removeChild(linesGroup.firstChild);
        while (freehandGroup.firstChild) freehandGroup.removeChild(freehandGroup.firstChild);
        lines.length = 0;
        freehandStrokes.length = 0;
        undoStack.length = 0;
        lineKeys.clear();
        createDots();
      }

      function smoothPoints(points, passes) {
        if (points.length < 3) return points;
        let current = points.map(p => ({ x: p.x, y: p.y }));
        for (let pass = 0; pass < (passes || 1); pass++) {
          const next = [current[0]];
          for (let i = 1; i < current.length - 1; i++) {
            next.push({
              x: 0.2 * current[i - 1].x + 0.6 * current[i].x + 0.2 * current[i + 1].x,
              y: 0.2 * current[i - 1].y + 0.6 * current[i].y + 0.2 * current[i + 1].y
            });
          }
          next.push(current[current.length - 1]);
          current = next;
        }
        return current;
      }

      function pathFromPoints(points) {
        return points.map((p, i) => (i === 0 ? `M ${p.x} ${p.y}` : `L ${p.x} ${p.y}`)).join(' ');
      }

      function coords(e) {
        if (!boardRect) boardRect = board.getBoundingClientRect();
        const scaleX = BOARD_SIZE / boardRect.width;
        const scaleY = BOARD_SIZE / boardRect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - boardRect.left) * scaleX, y: (clientY - boardRect.top) * scaleY };
      }

      function pointerDown(e) {
        e.preventDefault();
        boardRect = board.getBoundingClientRect();
        const { x, y } = coords(e);
        const i = getDot(x, y);
        if (i >= 0) { dragStart = i; return; }
        freehandPoints = [{ x, y }];
        freehandPath = document.createElementNS(NS, 'path');
        freehandPath.setAttribute('d', `M ${x} ${y}`);
        freehandPath.setAttribute('fill', 'none');
        freehandPath.setAttribute('stroke', '#fff');
        freehandPath.setAttribute('stroke-width', '3');
        freehandPath.setAttribute('stroke-linecap', 'round');
        freehandPath.setAttribute('stroke-linejoin', 'round');
        freehandGroup.appendChild(freehandPath);
      }

      function pointerMove(e) {
        e.preventDefault();
        const { x, y } = coords(e);
        if (freehandPath) {
          freehandPoints.push({ x, y });
          freehandPath.setAttribute('d', pathFromPoints(freehandPoints));
          return;
        }
        if (dragStart === null) return;
        const j = getDot(x, y);
        if (j >= 0 && j !== dragStart) {
          previewGroup?.remove();
          previewGroup = document.createElementNS(NS, 'g');
          [[dragStart, j], [rotatedDotIndex(dragStart, 1), rotatedDotIndex(j, 1)], [rotatedDotIndex(dragStart, 2), rotatedDotIndex(j, 2)], [rotatedDotIndex(dragStart, 3), rotatedDotIndex(j, 3)]].forEach(([a, b]) => {
            if (a >= 0 && b >= 0 && a !== b) previewGroup.appendChild(createLine(dots[a].x, dots[a].y, dots[b].x, dots[b].y, 0.6));
          });
          linesGroup.appendChild(previewGroup);
        }
      }

      function pointerUp(e) {
        e.preventDefault();
        if (freehandPath) {
          let pts = freehandPoints.length > 2 ? smoothPoints(freehandPoints, 1) : freehandPoints;
          freehandPath.setAttribute('d', pathFromPoints(pts));
          freehandStrokes.push(freehandPath);
          undoStack.push({ type: 'freehand', path: freehandPath });
          freehandPath = null;
          freehandPoints = [];
          return;
        }
        if (dragStart === null) return;
        const { x, y } = coords(e);
        const j = getDot(x, y);
        previewGroup?.remove();
        previewGroup = null;
        if (j >= 0 && j !== dragStart) addLine(dragStart, j);
        dragStart = null;
      }

      function undo() {
        const action = undoStack.pop();
        if (!action) return;
        if (action.type === 'segment') {
          const removed = new Set(action.items.map(i => i.lineEl));
          action.items.forEach(({ lineEl, crossEl, a, b }) => {
            lineKeys.delete(segmentKey(a, b));
            lineEl.remove();
            crossEl.remove();
          });
          for (let i = lines.length - 1; i >= 0; i--) if (removed.has(lines[i].el)) lines.splice(i, 1);
        } else if (action.type === 'freehand' && action.path.parentNode) {
          action.path.remove();
          freehandStrokes.splice(freehandStrokes.indexOf(action.path), 1);
        }
      }

      board.addEventListener('mousedown', pointerDown);
      board.addEventListener('mousemove', pointerMove);
      board.addEventListener('mouseup', pointerUp);
      board.addEventListener('mouseleave', pointerUp);
      board.addEventListener('touchstart', pointerDown, { passive: false });
      board.addEventListener('touchmove', pointerMove, { passive: false });
      board.addEventListener('touchend', pointerUp, { passive: false });

      document.getElementById('clear').addEventListener('click', () => {
        linesGroup.replaceChildren();
        freehandGroup.replaceChildren();
        lines.length = 0;
        freehandStrokes.length = 0;
        undoStack.length = 0;
        lineKeys.clear();
      });

      document.getElementById('undo').addEventListener('click', undo);

      const opacityEl = document.getElementById('opacity');
      opacityEl.addEventListener('input', () => linesGroup.setAttribute('opacity', opacityEl.value / 100));
      linesGroup.setAttribute('opacity', opacityEl.value / 100);

      const rowPatternEl = document.getElementById('rowPattern');
      rowPatternEl.addEventListener('change', function () {
        const parsed = parseRowPattern(this.value);
        this.value = parsed.join(',');
        rebuildBoard(this.value);
      });

      window.addEventListener('resize', () => { boardRect = null; });

      rebuildBoard('7,5,7,5,7');
    })();
  </script>
</body>
</html>
